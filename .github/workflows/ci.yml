name: Auto Build and Push to Docker Hub

# 이벤트 트리거: main 브랜치에 코드가 push 되거나 PR이 올라올 때 실행
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    # 우분투 최신 환경에서 실행
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 저장소(현재 코드) 체크아웃
      - name: ✅ Check out the repository
        uses: actions/checkout@v4

      # 2. Docker 빌드 캐시 등을 위한 Buildx 세팅
      - name: ⚙️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Github Secrets를 이용한 Docker Hub 로그인
      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Docker 이미지 빌드 및 Push 처리 (캐시 활성화로 속도 최적화)
      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }} # PR일 때는 빌드만 하고 푸시는 생략
          # DOCKERHUB_USERNAME을 태그네임 앞부분에 박아 넣어 저장소 맞춰주기
          # latest 태그와 해당 시점의 고유 커밋 해시(sha) 태그 두 개를 동시에 배포
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lookalike-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lookalike-server:${{ github.sha }}
          # 이전 빌드 캐시를 불러와서 똑같은 패키지 다운로드를 건너뛰도록 최적화
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/lookalike-server:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/lookalike-server:buildcache,mode=max
